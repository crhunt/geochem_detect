# Default hyperparameters for AutoencoderDetector
# These values are also the class defaults in models/autoencoder.py

model:
  encoding_dim: 4
  hidden_dims: [32, 16]
  dropout_rate: 0.2
  learning_rate: 0.001
  epochs: 50
  batch_size: 64
  validation_split: 0.1   # used only when no explicit val set is provided
  patience: 10

# Whether to include scaled lat/lon as auxiliary inputs to the encoder
training:
  spatial: false
  contamination_threshold: 0.05
